services:
  - type: web
    name: apk-refer-earn-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_bot.py
    healthCheckPath: /healthz
    envVars:
      - key: RENDER_URL
        fromService:
          type: web
          name: apk-refer-earn-bot
          property: host
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: NOTIFY_ID
        sync: false
